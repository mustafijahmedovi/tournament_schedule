<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tournament View</title>
<link rel="stylesheet" href="style-tournament.css">
</head>
<body>

<div id="customAlertOverlay" class="custom-alert-overlay">
  <div class="custom-alert-box">
    <p id="customAlertMessage" class="custom-alert-text"></p>
    <button onclick="hideCustomAlert()" class="custom-alert-btn">OK</button>
  </div>
</div>

<div id="customConfirmOverlay" class="custom-alert-overlay">
  <div class="custom-alert-box">
    <p id="customConfirmMessage" class="custom-alert-text"></p>
    <div style="display:flex; gap:10px;">
      <button onclick="handleCustomConfirm(false)" class="custom-alert-btn" style="background:#22222E;">Cancel</button>
      <button onclick="handleCustomConfirm(true)" class="custom-alert-btn">Confirm</button>
    </div>
  </div>
</div>

<div id="loadingBox" class="loading">Loading tournament...</div>
<div id="errorBox" class="error-box" style="display:none;"></div>

<div id="content" style="display:none;">
  <div style="text-align:center; padding-top:24px;">
    <img src="devntric-icon-circle.png" alt="Devntric" style="width:36px; height:36px;">
  </div>
  <h1 id="tournamentName">🏆 Tournament</h1>
  <p class="subtitle">Share this page's link so others can view live standings</p>

  <div class="group-tabs" id="groupTabs"></div>

  <div class="card" id="standingsCard">
    <h2>Standings</h2>
    <div id="standingsTable"></div>
  </div>

  <div class="card" id="firstRoundCard">
    <h2>First Round</h2>
    <div id="matchesSummary" style="font-size:13px; color:#9494A8; margin-bottom:12px;"></div>
    <div id="scheduleList"></div>
  </div>

  <div class="card">
    <h2>Knockout Stage</h2>

    <div id="addRoundSection" style="margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid #26263A;">
      <button onclick="toggleAddRoundForm()" style="width:auto; padding:8px 16px; font-size:14px; background:#A238FF;">+ Add Knockout Round</button>

      <div id="addRoundForm" style="display:none; margin-top:16px;">
        <label style="display:block; font-weight:600; font-size:13px; margin-bottom:6px;">Round Name</label>
        <select id="roundNameSelect" onchange="handleRoundNameSelect()" style="width:100%; padding:8px 10px; border-radius:6px; border:1px solid #26263A; margin-bottom:8px;"></select>
        <input type="text" id="roundNameInput" placeholder="Enter round name" style="width:100%; padding:8px 10px; border-radius:6px; border:1px solid #26263A; margin-bottom:12px; display:none;">

        <label style="display:block; font-weight:600; font-size:13px; margin-bottom:6px;">Fixture Selection</label>
        <div style="display:flex; gap:8px; margin-bottom:14px;">
          <button type="button" id="fixtureModeAutoBtn" onclick="setFixtureMode('automatic')" style="flex:1; padding:8px; font-size:13px; background:#A238FF; margin-top:0;">Automatic</button>
          <button type="button" id="fixtureModeManualBtn" onclick="setFixtureMode('manual')" style="flex:1; padding:8px; font-size:13px; background:#22222E; color:#F1F1F6; margin-top:0;">User Select</button>
        </div>

        <div id="automaticFixtureInfo" style="display:none; font-size:13px; color:#9494A8; margin-bottom:12px; padding:10px; background:#1A1626; border-radius:6px;"></div>

        <div id="manualFixtureSection" style="display:none;">
          <label style="display:block; font-weight:600; font-size:13px; margin-bottom:6px;">Matchups</label>
          <div id="matchupRows"></div>
          <button onclick="addMatchupRow()" style="width:auto; padding:6px 12px; font-size:13px; background:#22222E; color:#F1F1F6; margin-top:6px;">+ Add Matchup</button>
        </div>

        <div style="display:flex; gap:8px; margin-top:16px;">
          <button onclick="submitNewRound()" style="background:#22C55E;">Save Round</button>
          <button onclick="toggleAddRoundForm()" style="background:#33333F;">Cancel</button>
        </div>
      </div>
    </div>

    <div id="championBanner"></div>
    <div id="knockoutList"></div>
  </div>
</div>

<footer class="devntric-footer">
  <img src="devntric-icon-circle.png" alt="Devntric">
  <div class="footer-brand">TOURNAMENT SCHEDULER <span class="version">v1.0.0</span></div>
  <div class="footer-credit">Developed by <a href="https://www.linkedin.com/in/mustafij55/" target="_blank" class="footer-highlight">Mustafij Ahmed Ovi</a></div>
  <div class="footer-copyright">© 2026 All Rights Reserved. <a href="https://devntric.com/" target="_blank" class="footer-highlight">Devntric</a></div>
</footer>

<script>
const API_BASE = "https://tournament-schedule.onrender.com";

function showCustomAlert(message) {
  document.getElementById("customAlertMessage").innerText = message;
  document.getElementById("customAlertOverlay").classList.add("show");
}

function hideCustomAlert() {
  document.getElementById("customAlertOverlay").classList.remove("show");
}

let pendingConfirmCallback = null;

function showCustomConfirm(message, onConfirm) {
  document.getElementById("customConfirmMessage").innerText = message;
  document.getElementById("customConfirmOverlay").classList.add("show");
  pendingConfirmCallback = onConfirm;
}

function handleCustomConfirm(confirmed) {
  document.getElementById("customConfirmOverlay").classList.remove("show");
  if (confirmed && pendingConfirmCallback) {
    pendingConfirmCallback();
  }
  pendingConfirmCallback = null;
}
const urlParams = new URLSearchParams(window.location.search);
const tournamentId = urlParams.get("id");

let tournamentData = null;
let currentGroup = 0;

async function loadTournament() {
  if (!tournamentId) {
    showError("No tournament ID provided in the link.");
    return;
  }

  try {
    const response = await fetch(`${API_BASE}/tournament/${tournamentId}`);
    if (!response.ok) throw new Error("Tournament not found");
    tournamentData = await response.json();

    document.getElementById("tournamentName").innerText = "🏆 " + tournamentData.name;
    document.getElementById("loadingBox").style.display = "none";
    document.getElementById("content").style.display = "block";

    const isKnockoutOnly = tournamentData.tournament_format === "knockout";
    document.getElementById("standingsCard").style.display = isKnockoutOnly ? "none" : "block";
    document.getElementById("firstRoundCard").style.display = isKnockoutOnly ? "none" : "block";

    renderGroupTabs();
    if (!isKnockoutOnly) {
      await renderStandings();
      renderSchedule();
    }
    renderKnockout();

  } catch (error) {
    showError("Could not load tournament. Check the link or make sure the server is running.");
  }
}

function renderGroupTabs() {
  const tabsDiv = document.getElementById("groupTabs");
  const numGroups = tournamentData.groups.length;

  if (numGroups <= 1) {
    tabsDiv.style.display = "none";
    return;
  }

  tabsDiv.innerHTML = tournamentData.groups.map((g, i) => {
    const letter = String.fromCharCode(65 + i);
    return `<button class="group-tab ${i === currentGroup ? 'active' : ''}" onclick="switchGroup(${i})">Group ${letter}</button>`;
  }).join("");
}

async function switchGroup(index) {
  currentGroup = index;
  renderGroupTabs();
  await renderStandings();
  renderSchedule();
}

async function renderStandings() {
  const container = document.getElementById("standingsTable");
  try {
    const response = await fetch(`${API_BASE}/tournament/${tournamentId}/standings`);
    const data = await response.json();
    const table = data.standings[currentGroup];

    let html = `
      <table>
        <thead>
          <tr>
            <th style="text-align:left;">Team</th>
            <th>P</th><th>W</th><th>D</th><th>L</th>
            <th>GF</th><th>GA</th><th>GD</th><th>Pts</th>
          </tr>
        </thead>
        <tbody>
    `;
    table.forEach(row => {
      html += `
        <tr>
          <td class="team-name">${escapeHtml(row.team)}</td>
          <td>${row.played}</td><td>${row.won}</td><td>${row.drawn}</td><td>${row.lost}</td>
          <td>${row.goals_for}</td><td>${row.goals_against}</td><td>${row.goal_difference}</td>
          <td><strong>${row.points}</strong></td>
        </tr>
      `;
    });
    html += "</tbody></table>";
    container.innerHTML = html;

  } catch (error) {
    container.innerHTML = "<p>Could not load standings.</p>";
  }
}

function renderMatchMetaBlock(keyPrefix, matchTime, location) {
  const hasInfo = matchTime || location;
  const displayParts = [];
  if (matchTime) {
    const d = new Date(matchTime);
    displayParts.push(`🕐 ${d.toLocaleString()}`);
  }
  if (location) displayParts.push(`📍 ${escapeHtml(location)}`);
  const displayText = hasInfo ? displayParts.join(" &nbsp;·&nbsp; ") : '<span style="color:#6A6A80;">No time or location set</span>';

  return `
    <div class="match-meta" id="metaDisplay_${keyPrefix}">
      <span style="font-size:12px; color:#9494A8;">${displayText}</span>
      <button onclick="toggleMetaEdit('${keyPrefix}')" style="width:auto; padding:2px 8px; font-size:11px; background:#22222E; color:#F1F1F6; margin-top:0;">${hasInfo ? "Edit" : "+ Add time/location"}</button>
    </div>
    <div class="match-meta-edit" id="metaEdit_${keyPrefix}" style="display:none;">
      <input type="datetime-local" id="metaTime_${keyPrefix}" value="${matchTime ? matchTime : ''}" style="padding:5px; font-size:12px; border-radius:6px; border:1px solid #26263A;">
      <input type="text" id="metaLocation_${keyPrefix}" placeholder="Location (e.g. City Stadium)" value="${location ? escapeHtml(location) : ''}" style="padding:5px; font-size:12px; border-radius:6px; border:1px solid #26263A; flex:1; min-width:120px;">
      <button onclick="saveMetaEdit('${keyPrefix}')" style="width:auto; padding:5px 10px; font-size:11px;">Save</button>
    </div>
  `;
}

function toggleMetaEdit(keyPrefix) {
  const display = document.getElementById(`metaDisplay_${keyPrefix}`);
  const edit = document.getElementById(`metaEdit_${keyPrefix}`);
  const isHidden = edit.style.display === "none";
  edit.style.display = isHidden ? "flex" : "none";
  display.style.display = isHidden ? "none" : "flex";
}

async function saveMetaEdit(keyPrefix) {
  const matchTime = document.getElementById(`metaTime_${keyPrefix}`).value || null;
  const location = document.getElementById(`metaLocation_${keyPrefix}`).value.trim() || null;

  const parts = keyPrefix.split("_");
  try {
    if (parts[0] === "g") {
      // group match: g_groupIndex_roundIndex_matchIndex
      await fetch(`${API_BASE}/match-schedule`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          tournament_id: tournamentId,
          group_index: parseInt(parts[1]),
          round_index: parseInt(parts[2]),
          match_index: parseInt(parts[3]),
          match_time: matchTime,
          location: location
        })
      });
    } else {
      // knockout match: k_roundIndex_matchIndex
      await fetch(`${API_BASE}/knockout-schedule`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          tournament_id: tournamentId,
          round_index: parseInt(parts[1]),
          match_index: parseInt(parts[2]),
          match_time: matchTime,
          location: location
        })
      });
    }
    await refreshTournamentData();
  } catch (error) {
    showCustomAlert("Could not save match details.");
  }
}

function renderSchedule() {
  const container = document.getElementById("scheduleList");
  const summaryDiv = document.getElementById("matchesSummary");
  const groupSchedule = tournamentData.schedule[currentGroup];
  const groupResults = tournamentData.results[currentGroup];
  const isCricket = tournamentData.game_type === "cricket";

  // Count total real matches (excluding byes) and how many are played
  let totalMatches = 0;
  let playedMatches = 0;
  groupSchedule.forEach((roundMatches, roundIndex) => {
    roundMatches.forEach((match, matchIndex) => {
      const [t1, t2] = match;
      if (t1 === "BYE" || t2 === "BYE") return;
      totalMatches++;
      if (groupResults[roundIndex][matchIndex].played) playedMatches++;
    });
  });
  summaryDiv.innerText = `${playedMatches} of ${totalMatches} matches played`;

  let html = "";

  if (tournamentData.groups.length > 1) {
    const letter = String.fromCharCode(65 + currentGroup);
    html += `<div style="font-size:13px; font-weight:600; color:#A238FF; margin-bottom:14px;">GROUP ${letter}</div>`;
  }

  groupSchedule.forEach((roundMatches, roundIndex) => {
    html += `<div class="round-block"><div class="round-title">Matchday ${roundIndex + 1}</div>`;

    roundMatches.forEach((match, matchIndex) => {
      const [team1, team2] = match;
      const result = groupResults[roundIndex][matchIndex];

      if (team1 === "BYE" || team2 === "BYE") {
        const restingTeam = team1 === "BYE" ? team2 : team1;
        html += `<div class="match-row bye-row">${escapeHtml(restingTeam)} — Bye (resting this round)</div>`;
        return;
      }

      if (result.played) {
        let scoreDisplay;
        if (isCricket) {
          const w1 = result.team1_wickets !== null && result.team1_wickets !== undefined ? result.team1_wickets : "-";
          const w2 = result.team2_wickets !== null && result.team2_wickets !== undefined ? result.team2_wickets : "-";
          scoreDisplay = `${result.team1_score}/${w1} - ${result.team2_score}/${w2}`;
        } else {
          scoreDisplay = `${result.team1_score} - ${result.team2_score}`;
        }
        html += `
          <div class="match-row">
            <span class="match-teams">${escapeHtml(team1)} <strong>${scoreDisplay}</strong> ${escapeHtml(team2)}</span>
            <span class="played-badge">✓ Played</span>
            ${renderMatchMetaBlock(`g_${currentGroup}_${roundIndex}_${matchIndex}`, result.match_time, result.location)}
          </div>
        `;
      } else if (isCricket) {
        html += `
          <div class="match-row">
            <span class="match-teams">${escapeHtml(team1)} vs ${escapeHtml(team2)}</span>
            <div class="score-inputs">
              <input type="number" min="0" id="runs1_${roundIndex}_${matchIndex}" placeholder="Runs" style="width:60px;">
              <span>/</span>
              <input type="number" min="0" max="10" id="wkts1_${roundIndex}_${matchIndex}" placeholder="Wkts" style="width:50px;">
              <span>vs</span>
              <input type="number" min="0" id="runs2_${roundIndex}_${matchIndex}" placeholder="Runs" style="width:60px;">
              <span>/</span>
              <input type="number" min="0" max="10" id="wkts2_${roundIndex}_${matchIndex}" placeholder="Wkts" style="width:50px;">
              <button onclick="submitCricketResult(${roundIndex}, ${matchIndex})">Save</button>
            </div>
            ${renderMatchMetaBlock(`g_${currentGroup}_${roundIndex}_${matchIndex}`, result.match_time, result.location)}
          </div>
        `;
      } else {
        html += `
          <div class="match-row">
            <span class="match-teams">${escapeHtml(team1)} vs ${escapeHtml(team2)}</span>
            <div class="score-inputs">
              <input type="number" min="0" id="score1_${roundIndex}_${matchIndex}" placeholder="0">
              <span>-</span>
              <input type="number" min="0" id="score2_${roundIndex}_${matchIndex}" placeholder="0">
              <button onclick="submitResult(${roundIndex}, ${matchIndex})">Save</button>
            </div>
            ${renderMatchMetaBlock(`g_${currentGroup}_${roundIndex}_${matchIndex}`, result.match_time, result.location)}
          </div>
        `;
      }
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

async function submitCricketResult(roundIndex, matchIndex) {
  const runs1 = parseInt(document.getElementById(`runs1_${roundIndex}_${matchIndex}`).value);
  const wkts1 = parseInt(document.getElementById(`wkts1_${roundIndex}_${matchIndex}`).value);
  const runs2 = parseInt(document.getElementById(`runs2_${roundIndex}_${matchIndex}`).value);
  const wkts2 = parseInt(document.getElementById(`wkts2_${roundIndex}_${matchIndex}`).value);

  if (isNaN(runs1) || isNaN(runs2)) {
    showCustomAlert("Please enter runs for both teams.");
    return;
  }

  try {
    await fetch(`${API_BASE}/match-result`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        tournament_id: tournamentId,
        group_index: currentGroup,
        round_index: roundIndex,
        match_index: matchIndex,
        team1_score: runs1,
        team2_score: runs2,
        team1_wickets: isNaN(wkts1) ? null : wkts1,
        team2_wickets: isNaN(wkts2) ? null : wkts2
      })
    });

    const response = await fetch(`${API_BASE}/tournament/${tournamentId}`);
    tournamentData = await response.json();

    await renderStandings();
    renderSchedule();

  } catch (error) {
    showCustomAlert("Could not save result. Please try again.");
  }
}

async function submitResult(roundIndex, matchIndex) {
  const score1El = document.getElementById(`score1_${roundIndex}_${matchIndex}`);
  const score2El = document.getElementById(`score2_${roundIndex}_${matchIndex}`);

  const score1 = parseInt(score1El.value);
  const score2 = parseInt(score2El.value);

  if (isNaN(score1) || isNaN(score2) || score1 < 0 || score2 < 0) {
    showCustomAlert("Please enter valid scores for both teams.");
    return;
  }

  try {
    await fetch(`${API_BASE}/match-result`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        tournament_id: tournamentId,
        group_index: currentGroup,
        round_index: roundIndex,
        match_index: matchIndex,
        team1_score: score1,
        team2_score: score2
      })
    });

    // Refresh local data so the UI updates
    const response = await fetch(`${API_BASE}/tournament/${tournamentId}`);
    tournamentData = await response.json();

    await renderStandings();
    renderSchedule();

  } catch (error) {
    showCustomAlert("Could not save result. Please try again.");
  }
}

function showError(msg) {
  document.getElementById("loadingBox").style.display = "none";
  const errorBox = document.getElementById("errorBox");
  errorBox.innerText = msg;
  errorBox.style.display = "block";
}

function getAllTeamNames() {
  // Flatten all teams across all groups
  let allTeams = [];
  tournamentData.groups.forEach(group => {
    group.forEach(team => allTeams.push(team));
  });
  return allTeams;
}

function getEliminatedTeams() {
  const knockout = tournamentData.knockout || [];
  const eliminated = new Set();
  knockout.forEach(round => {
    round.matches.forEach(match => {
      if (match.played) {
        const loser = match.winner === match.team1 ? match.team2 : match.team1;
        eliminated.add(loser);
      }
    });
  });
  return eliminated;
}

function getAvailableTeamsForKnockout() {
  const eliminated = getEliminatedTeams();
  return getAllTeamNames().filter(team => !eliminated.has(team));
}

function getChampion() {
  const knockout = tournamentData.knockout || [];
  if (knockout.length === 0) return null;
  const lastRound = knockout[knockout.length - 1];
  // A "final" is any round with exactly one match, once that match is played
  if (lastRound.matches.length === 1 && lastRound.matches[0].played) {
    const finalMatch = lastRound.matches[0];
    const runnerUp = finalMatch.winner === finalMatch.team1 ? finalMatch.team2 : finalMatch.team1;
    return { champion: finalMatch.winner, runnerUp: runnerUp };
  }
  return null;
}

const PRESET_ROUND_NAMES = ["First Round", "Second Round", "Round of 16", "Quarterfinal", "Semifinal", "Final"];

function getUsedRoundNames() {
  const knockout = tournamentData.knockout || [];
  return new Set(knockout.map(r => r.round_name));
}

function populateRoundNameSelect() {
  const usedNames = getUsedRoundNames();
  const availablePresets = PRESET_ROUND_NAMES.filter(name => !usedNames.has(name));

  const select = document.getElementById("roundNameSelect");
  let optionsHtml = availablePresets.map(name => `<option value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join("");
  optionsHtml += `<option value="__custom__">Choose name...</option>`;
  select.innerHTML = optionsHtml;

  handleRoundNameSelect();
}

function handleRoundNameSelect() {
  const select = document.getElementById("roundNameSelect");
  const customInput = document.getElementById("roundNameInput");

  if (select.value === "__custom__") {
    customInput.style.display = "block";
    customInput.value = "";
  } else {
    customInput.style.display = "none";
    customInput.value = select.value;
  }
}

let currentFixtureMode = "automatic";
let autoFixturePairs = [];
let autoFixtureByeTeam = null;

function toggleAddRoundForm() {
  const form = document.getElementById("addRoundForm");
  const isHidden = form.style.display === "none";
  form.style.display = isHidden ? "block" : "none";
  if (isHidden) {
    document.getElementById("matchupRows").innerHTML = "";
    populateRoundNameSelect();
    setFixtureMode("automatic");
    addMatchupRow();
  }
}

function setFixtureMode(mode) {
  currentFixtureMode = mode;

  const autoBtn = document.getElementById("fixtureModeAutoBtn");
  const manualBtn = document.getElementById("fixtureModeManualBtn");
  const autoInfo = document.getElementById("automaticFixtureInfo");
  const manualSection = document.getElementById("manualFixtureSection");

  if (mode === "automatic") {
    autoBtn.style.background = "#A238FF";
    autoBtn.style.color = "white";
    manualBtn.style.background = "#22222E";
    manualBtn.style.color = "#F1F1F6";
    autoInfo.style.display = "block";
    manualSection.style.display = "none";
    generateAutomaticFixture();
  } else {
    manualBtn.style.background = "#A238FF";
    manualBtn.style.color = "white";
    autoBtn.style.background = "#22222E";
    autoBtn.style.color = "#F1F1F6";
    autoInfo.style.display = "none";
    manualSection.style.display = "block";
  }
}

function shuffleArray(arr) {
  const copy = [...arr];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function generateAutomaticFixture() {
  const available = shuffleArray(getAvailableTeamsForKnockout());
  autoFixturePairs = [];
  autoFixtureByeTeam = null;

  for (let i = 0; i < available.length - 1; i += 2) {
    autoFixturePairs.push([available[i], available[i + 1]]);
  }
  if (available.length % 2 !== 0) {
    autoFixtureByeTeam = available[available.length - 1];
  }

  const infoDiv = document.getElementById("automaticFixtureInfo");
  let html = "<strong>Auto-generated fixture:</strong><br>";
  autoFixturePairs.forEach(pair => {
    html += `${escapeHtml(pair[0])} vs ${escapeHtml(pair[1])}<br>`;
  });
  if (autoFixtureByeTeam) {
    html += `<em>${escapeHtml(autoFixtureByeTeam)} gets a bye and advances automatically</em>`;
  }
  infoDiv.innerHTML = html;
}

function addMatchupRow() {
  const container = document.getElementById("matchupRows");
  const teams = getAvailableTeamsForKnockout();

  const options = teams.map(t => `<option value="${escapeHtml(t)}">${escapeHtml(t)}</option>`).join("");

  const row = document.createElement("div");
  row.style.cssText = "display:flex; gap:8px; align-items:center; margin-bottom:8px;";
  row.innerHTML = `
    <select class="matchup-team1" style="flex:1; padding:8px; border-radius:6px; border:1px solid #26263A;" onchange="refreshMatchupOptions(this)">
      <option value="">Select team</option>${options}
    </select>
    <span style="color:#7A7A90;">vs</span>
    <select class="matchup-team2" style="flex:1; padding:8px; border-radius:6px; border:1px solid #26263A;" onchange="refreshMatchupOptions(this)">
      <option value="">Select team</option>${options}
    </select>
    <button onclick="this.parentElement.remove()" style="width:auto; padding:8px 10px; background:#3A1620; color:#FF6B87; font-size:13px;">✕</button>
  `;
  container.appendChild(row);
}

function refreshMatchupOptions(changedSelect) {
  // Prevent selecting the same team on both sides of one matchup row
  const row = changedSelect.parentElement;
  const team1Select = row.querySelector(".matchup-team1");
  const team2Select = row.querySelector(".matchup-team2");
  const otherSelect = changedSelect === team1Select ? team2Select : team1Select;
  const chosenValue = changedSelect.value;

  Array.from(otherSelect.options).forEach(opt => {
    opt.disabled = (opt.value !== "" && opt.value === chosenValue);
  });
}

async function submitNewRound() {
  const select = document.getElementById("roundNameSelect");
  const customInput = document.getElementById("roundNameInput");
  const roundName = select.value === "__custom__" ? customInput.value.trim() : select.value;

  if (!roundName) {
    showCustomAlert("Please choose or enter a round name.");
    return;
  }

  let matchups = [];

  if (currentFixtureMode === "automatic") {
    if (autoFixturePairs.length === 0) {
      showCustomAlert("Not enough teams available to generate a fixture.");
      return;
    }
    matchups = autoFixturePairs;
  } else {
    const rows = document.querySelectorAll("#matchupRows > div");
    for (const row of rows) {
      const t1 = row.querySelector(".matchup-team1").value;
      const t2 = row.querySelector(".matchup-team2").value;
      if (!t1 || !t2) {
        showCustomAlert("Please select both teams for every matchup.");
        return;
      }
      if (t1 === t2) {
        showCustomAlert("A team cannot play itself.");
        return;
      }
      matchups.push([t1, t2]);
    }
    if (matchups.length === 0) {
      showCustomAlert("Please add at least one matchup.");
      return;
    }
  }

  try {
    await fetch(`${API_BASE}/tournament/${tournamentId}/knockout/round`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        tournament_id: tournamentId,
        round_name: roundName,
        matchups: matchups
      })
    });

    toggleAddRoundForm();
    await refreshTournamentData();

  } catch (error) {
    showCustomAlert("Could not save round. Please try again.");
  }
}

async function deleteKnockoutRound(roundIndex) {
  showCustomConfirm("Remove this round? This cannot be undone.", async () => {
    try {
      await fetch(`${API_BASE}/tournament/${tournamentId}/knockout/round/${roundIndex}`, {
        method: "DELETE"
      });
      await refreshTournamentData();
    } catch (error) {
      showCustomAlert("Could not remove round.");
    }
  });
}

function renderKnockout() {
  const container = document.getElementById("knockoutList");
  const bannerDiv = document.getElementById("championBanner");
  const addSection = document.getElementById("addRoundSection");
  const knockout = tournamentData.knockout || [];
  const isCricket = tournamentData.game_type === "cricket";

  const result = getChampion();
  if (result) {
    bannerDiv.innerHTML = `
      <div class="champion-banner">
        <div class="champion-trophy">🏆</div>
        <div class="champion-title">Tournament Champion</div>
        <div class="champion-name">${escapeHtml(result.champion)}</div>
        <div class="runner-up-box">
          <div class="runner-up-medal">🥈</div>
          <div class="runner-up-title">Runner-Up</div>
          <div class="runner-up-name">${escapeHtml(result.runnerUp)}</div>
        </div>
      </div>
    `;
    addSection.style.display = "none";
  } else {
    bannerDiv.innerHTML = "";
    addSection.style.display = "block";
  }

  if (knockout.length === 0) {
    container.innerHTML = '<p style="color:#7A7A90; font-size:14px;">No knockout rounds yet. Add one below once your group stage is ready.</p>';
    return;
  }

  let html = "";

  knockout.forEach((round, roundIndex) => {
    const totalInRound = round.matches.length;
    const playedInRound = round.matches.filter(m => m.played).length;

    html += `
      <div style="margin-bottom:20px;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:2px;">
          <div style="font-weight:700; font-size:15px; color:#F1F1F6;">${escapeHtml(round.round_name)}</div>
          <button onclick="deleteKnockoutRound(${roundIndex})" style="width:auto; padding:4px 10px; font-size:12px; background:#3A1620; color:#FF6B87;">Remove Round</button>
        </div>
        <div style="font-size:12px; color:#8888A0; margin-bottom:8px;">${playedInRound} of ${totalInRound} matches played</div>
    `;

    round.matches.forEach((match, matchIndex) => {
      if (match.played) {
        let scoreText = "";
        if (match.team1_score !== null && match.team2_score !== null) {
          if (isCricket) {
            const w1 = match.team1_wickets ?? "-";
            const w2 = match.team2_wickets ?? "-";
            scoreText = `${match.team1_score}/${w1} - ${match.team2_score}/${w2}`;
          } else {
            scoreText = `${match.team1_score} - ${match.team2_score}`;
          }
        }
        html += `
          <div class="match-row">
            <span class="match-teams">
              ${match.winner === match.team1 ? '<strong>' : ''}${escapeHtml(match.team1)}${match.winner === match.team1 ? ' 🏆</strong>' : ''}
              ${scoreText ? `<strong>${scoreText}</strong>` : 'vs'}
              ${match.winner === match.team2 ? '<strong>' : ''}${escapeHtml(match.team2)}${match.winner === match.team2 ? ' 🏆</strong>' : ''}
            </span>
            <span class="played-badge">✓ ${escapeHtml(match.winner)} won</span>
            ${renderMatchMetaBlock(`k_${roundIndex}_${matchIndex}`, match.match_time, match.location)}
          </div>
        `;
      } else {
        const scoreInputs = isCricket ? `
          <input type="number" min="0" id="ko_r1s_${roundIndex}_${matchIndex}" placeholder="Runs" style="width:55px;">
          <span>/</span>
          <input type="number" min="0" max="10" id="ko_r1w_${roundIndex}_${matchIndex}" placeholder="Wkts" style="width:45px;">
          <span>vs</span>
          <input type="number" min="0" id="ko_r2s_${roundIndex}_${matchIndex}" placeholder="Runs" style="width:55px;">
          <span>/</span>
          <input type="number" min="0" max="10" id="ko_r2w_${roundIndex}_${matchIndex}" placeholder="Wkts" style="width:45px;">
        ` : `
          <input type="number" min="0" id="ko_r1s_${roundIndex}_${matchIndex}" placeholder="0" style="width:50px;">
          <span>-</span>
          <input type="number" min="0" id="ko_r2s_${roundIndex}_${matchIndex}" placeholder="0" style="width:50px;">
        `;

        html += `
          <div class="match-row" style="flex-direction:column; align-items:stretch;">
            <span class="match-teams">${escapeHtml(match.team1)} vs ${escapeHtml(match.team2)}</span>
            <div class="score-inputs" style="margin-top:6px;">
              ${scoreInputs}
            </div>
            <div style="display:flex; align-items:center; gap:8px; margin-top:8px;">
              <label style="font-size:12px; color:#9494A8;">Winner:</label>
              <select id="ko_winner_${roundIndex}_${matchIndex}" style="flex:1; padding:6px; border-radius:6px; border:1px solid #26263A;">
                <option value="">Select winner</option>
                <option value="${escapeHtml(match.team1)}">${escapeHtml(match.team1)}</option>
                <option value="${escapeHtml(match.team2)}">${escapeHtml(match.team2)}</option>
              </select>
              <button onclick="submitKnockoutResult(${roundIndex}, ${matchIndex})">Save</button>
            </div>
            ${renderMatchMetaBlock(`k_${roundIndex}_${matchIndex}`, match.match_time, match.location)}
          </div>
        `;
      }
    });

    html += `</div>`;
  });

  container.innerHTML = html;
}

async function submitKnockoutResult(roundIndex, matchIndex) {
  const winner = document.getElementById(`ko_winner_${roundIndex}_${matchIndex}`).value;
  if (!winner) {
    showCustomAlert("Please select the winner.");
    return;
  }

  const s1El = document.getElementById(`ko_r1s_${roundIndex}_${matchIndex}`);
  const s2El = document.getElementById(`ko_r2s_${roundIndex}_${matchIndex}`);
  const w1El = document.getElementById(`ko_r1w_${roundIndex}_${matchIndex}`);
  const w2El = document.getElementById(`ko_r2w_${roundIndex}_${matchIndex}`);

  const team1_score = s1El && s1El.value !== "" ? parseInt(s1El.value) : null;
  const team2_score = s2El && s2El.value !== "" ? parseInt(s2El.value) : null;
  const team1_wickets = w1El && w1El.value !== "" ? parseInt(w1El.value) : null;
  const team2_wickets = w2El && w2El.value !== "" ? parseInt(w2El.value) : null;

  try {
    await fetch(`${API_BASE}/knockout-result`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        tournament_id: tournamentId,
        round_index: roundIndex,
        match_index: matchIndex,
        winner: winner,
        team1_score: team1_score,
        team2_score: team2_score,
        team1_wickets: team1_wickets,
        team2_wickets: team2_wickets
      })
    });

    await refreshTournamentData();

  } catch (error) {
    showCustomAlert("Could not save result.");
  }
}

async function refreshTournamentData() {
  const response = await fetch(`${API_BASE}/tournament/${tournamentId}`);
  tournamentData = await response.json();
  const isKnockoutOnly = tournamentData.tournament_format === "knockout";
  if (!isKnockoutOnly) {
    await renderStandings();
    renderSchedule();
  }
  renderKnockout();
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.innerText = text;
  return div.innerHTML;
}

loadTournament();
</script>
